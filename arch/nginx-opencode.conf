# nginx-opencode.conf - reverse proxy http://__DOMAIN__ -> 127.0.0.1:__PORT__
# __PORT__ es el del API 'opencode-serve' (4096 por defecto). El propio serve
# tambien sirve la web UI en la ruta /app, asi que con esto basta para que
# http://__DOMAIN__/app abra OpenCode en el navegador.
# En Arch se instala en /etc/nginx/conf.d/opencode.conf (provision.sh sustituye los marcadores).

# keepalive: reutiliza conexiones TCP hacia el backend en vez de abrir una
# nueva por request (requiere proxy_http_version 1.1 + Connection vacio,
# que aporta el map de nginx-opencode-map.conf).
upstream opencode_api {
    server 127.0.0.1:__PORT__;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Compresion para los assets de la web UI (/app). El SSE no se toca:
    # text/event-stream no esta en gzip_types.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain application/wasm;

    location / {
        proxy_pass http://opencode_api;
        proxy_http_version 1.1;

        # WebSocket / SSE: OpenCode usa streaming en tiempo real.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Conexiones largas y sin buffering para el streaming.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
