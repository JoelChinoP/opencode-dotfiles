# nginx-opencode-map.conf - header Connection correcto para WebSocket.
# Este archivo debe cargarse en contexto http, no dentro de server {}.
# Para requests normales (sin Upgrade) se manda Connection vacio: asi nginx
# reutiliza las conexiones del bloque 'upstream ... keepalive' hacia el backend.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}
