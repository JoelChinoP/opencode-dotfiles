# nginx-opencode.conf - reverse proxy http://__DOMAIN__ -> 127.0.0.1:__PORT__
# __PORT__ es el del API 'opencode-serve' (4096 por defecto). El propio serve
# tambien sirve la web UI en la ruta /app, asi que con esto basta para que
# http://__DOMAIN__/app abra OpenCode en el navegador de Windows.
# Se instala en /etc/nginx/sites-available/opencode (provision.sh sustituye los marcadores).
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location / {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;

        # WebSocket / SSE: OpenCode usa streaming en tiempo real.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Conexiones largas y sin buffering para el streaming.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
